[phases.setup]
nixPkgs = ["...", "python311Packages.supervisor"]

[phases.build]
cmds = [
    "mkdir -p /etc/supervisor/conf.d",
    "cp /assets/worker-*.conf /etc/supervisor/conf.d/",
    "cp /assets/supervisord.conf /etc/supervisord.conf",
    "chmod +x /assets/start.sh",
    "...",
]

[start]
cmd = "/assets/start.sh"

[staticAssets]
"start.sh" = '''
#!/bin/bash
set -e
php /app/artisan migrate --force
php /app/artisan storage:link --force
node /assets/scripts/prestart.mjs /assets/nginx.cubfable.conf /nginx.conf
exec supervisord -c /etc/supervisord.conf
'''

"supervisord.conf" = '''
[unix_http_server]
file=/tmp/supervisor.sock
chmod=0700

[supervisord]
nodaemon=true
logfile=/app/storage/logs/supervisord.log
logfile_maxbytes=10MB
pidfile=/tmp/supervisord.pid

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[include]
files = /etc/supervisor/conf.d/*.conf
'''

"php-fpm-custom.conf" = '''
[global]
error_log = /proc/1/fd/2

[www]
listen = 127.0.0.1:9000
user = nobody
pm = dynamic
pm.max_children = 50
pm.min_spare_servers = 4
pm.max_spare_servers = 32
pm.start_servers = 18
clear_env = no
catch_workers_output = yes
decorate_workers_output = no
'''

"worker-web.conf" = '''
[program:php-fpm]
command=php-fpm -y /assets/php-fpm-custom.conf -F
autostart=true
autorestart=true
priority=5
stderr_logfile=/app/storage/logs/fpm.err.log
stdout_logfile=/app/storage/logs/fpm.out.log

[program:nginx]
command=nginx -c /nginx.conf
autostart=true
autorestart=true
priority=10
stderr_logfile=/app/storage/logs/nginx.err.log
stdout_logfile=/app/storage/logs/nginx.out.log
'''

"worker-queue.conf" = '''
[program:queue]
command=php /app/artisan queue:work --queue=default,books --sleep=3 --tries=1 --timeout=3600 --max-time=3600
directory=/app
autostart=true
autorestart=true
numprocs=1
priority=20
stderr_logfile=/app/storage/logs/queue.err.log
stdout_logfile=/app/storage/logs/queue.out.log
'''

# Laravel scheduler: without this process scheduled tasks (weekly
# disposable-email list refresh, weekly VPN/datacenter IP list refresh)
# never run in the container.
"worker-schedule.conf" = '''
[program:schedule]
command=php /app/artisan schedule:work
directory=/app
autostart=true
autorestart=true
numprocs=1
priority=30
stderr_logfile=/app/storage/logs/schedule.err.log
stdout_logfile=/app/storage/logs/schedule.out.log
'''

# Custom nginx template: the stock Nixpacks PHP template renders TWO
# `location /` blocks for this app (both IS_LARAVEL and
# NIXPACKS_PHP_FALLBACK_PATH are set), which makes nginx fail with
# "duplicate location". This is the same config with a single `location /`.
"nginx.cubfable.conf" = '''
worker_processes 5;
daemon off;

worker_rlimit_nofile 8192;

events {
  worker_connections  4096;
}

http {
    include    $!{nginx}/conf/mime.types;
    index    index.html index.htm index.php;

    default_type application/octet-stream;
    log_format   main '$remote_addr - $remote_user [$time_local]  $status '
        '"$request" $body_bytes_sent "$http_referer" '
        '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /dev/stdout;
    error_log /dev/stdout;
    sendfile     on;
    tcp_nopush   on;
    server_names_hash_bucket_size 128;

    server {
        listen ${PORT};
        listen [::]:${PORT};
        server_name localhost;

        root /app/public;

        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";

        index index.php;

        charset utf-8;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        error_page 404 /index.php;

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
            include $!{nginx}/conf/fastcgi_params;
            include $!{nginx}/conf/fastcgi.conf;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }
    }
}
'''
